<header
    class="fixed w-full top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 transition-colors duration-300">
    <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <a routerLink="/"
                class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-600 bg-clip-text text-transparent hover:opacity-80 transition-opacity">
                Iamsharkawy
            </a>
            <span class="px-2 py-0.5 text-xs font-medium bg-green-100 text-green-800 rounded-full dark:bg-green-900/30 dark:text-green-400 border border-green-200 dark:border-green-800">
                Still Developing
            </span>
        </div>

        <!-- Desktop Menu -->
        <div class="hidden md:flex space-x-8">
            <a routerLink="/" routerLinkActive="text-blue-600 dark:text-blue-400"
                [routerLinkActiveOptions]="{exact: true}"
                class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white transition-colors">Home</a>
            <a routerLink="/about" routerLinkActive="text-blue-600 dark:text-blue-400"
                class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white transition-colors">About</a>
            <a routerLink="/projects" routerLinkActive="text-blue-600 dark:text-blue-400"
                class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white transition-colors">Projects</a>
            <a routerLink="/contact" routerLinkActive="text-blue-600 dark:text-blue-400"
                class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white transition-colors">Contact</a>
        </div>

        <!-- Theme Toggle Button -->
        <button (click)="themeService.toggleTheme()"
            class="p-2 rounded-full hover:bg-gray-800 transition-colors text-gray-300 hover:text-white mr-4"
            [attr.aria-label]="themeService.darkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
            <!-- Sun Icon -->
            <svg *ngIf="themeService.darkMode()" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
                </path>
            </svg>
            <!-- Moon Icon -->
            <svg *ngIf="!themeService.darkMode()" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z">
                </path>
            </svg>
        </button>

        <!-- Mobile Menu Button -->
        <button (click)="toggleMenu()" class="md:hidden text-gray-300 hover:text-white focus:outline-none">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path *ngIf="!isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 6h16M4 12h16M4 18h16"></path>
                <path *ngIf="isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </nav>

    <!-- Mobile Menu -->
    <div *ngIf="isMenuOpen"
        class="md:hidden bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 transition-colors duration-300">
        <div class="px-6 py-4 space-y-4 flex flex-col">
            <a routerLink="/" (click)="isMenuOpen = false"
                class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white transition-colors">Home</a>
            <a routerLink="/about" (click)="isMenuOpen = false"
                class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white transition-colors">About</a>
            <a routerLink="/projects" (click)="isMenuOpen = false"
                class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white transition-colors">Projects</a>
            <a routerLink="/contact" (click)="isMenuOpen = false"
                class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white transition-colors">Contact</a>
        </div>
    </div>
</header>
