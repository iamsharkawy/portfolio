<section
    class="min-h-screen py-20 px-6 flex items-center justify-center bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
    <div class="container mx-auto max-w-4xl">
        <div class="text-center mb-16">
            <h2 class="text-4xl font-bold mb-4 text-gray-900 dark:text-white">Get In <span
                    class="text-blue-600 dark:text-blue-400">Touch</span></h2>
            <p class="text-gray-600 dark:text-gray-400">Have a project in mind or just want to say hi? I'd love to hear
                from you.</p>
        </div>

        <div
            class="bg-white dark:bg-gray-800 rounded-2xl p-8 md:p-12 shadow-xl border border-gray-200 dark:border-gray-700 transition-colors duration-300">
            <form (ngSubmit)="onSubmit()" #contactForm="ngForm" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label for="name" class="text-sm font-medium text-gray-700 dark:text-gray-300">Name</label>
                        <input type="text" id="name" name="name" [(ngModel)]="formData.name" required
                            class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-gray-900 dark:text-white transition-all placeholder-gray-400 dark:placeholder-gray-500"
                            placeholder="Your Name">
                    </div>
                    <div class="space-y-2">
                        <label for="email" class="text-sm font-medium text-gray-700 dark:text-gray-300">Email</label>
                        <input type="email" id="email" name="email" [(ngModel)]="formData.email" required email
                            class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-gray-900 dark:text-white transition-all placeholder-gray-400 dark:placeholder-gray-500"
                            placeholder="your@email.com">
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="message" class="text-sm font-medium text-gray-700 dark:text-gray-300">Message</label>
                    <textarea id="message" name="message" [(ngModel)]="formData.message" required rows="6"
                        class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-gray-900 dark:text-white transition-all placeholder-gray-400 dark:placeholder-gray-500 resize-none"
                        placeholder="Tell me about your project..."></textarea>
                </div>

                <div class="flex justify-end">
                    <button type="submit" [disabled]="!contactForm.form.valid"
                        class="px-8 py-4 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-medium rounded-lg transition-all transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed shadow-lg">
                        Send Message
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
